<!DOCTYPE html>
<html lang="ko">
<head>

    :root {
      color-scheme: light;
      --page: #f7f8fb;
      --surface: #ffffff;
      --surface-soft: #f2f5fa;
      --line: #e1e6ef;
      --text: #141821;
      --muted: #667085;
      --faint: #98a2b3;
      --blue: #2f7df6;
      --shadow: 0 14px 34px rgba(20, 26, 36, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 248, 251, 0.96)),
        radial-gradient(circle at 18% 12%, rgba(47, 125, 246, 0.14), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(35, 185, 143, 0.12), transparent 28%),
        var(--page);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    button {
      border: 0;
      font: inherit;
    }

    .app {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 28px clamp(16px, 4vw, 40px) 42px;
    }

    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #fff 0 24%, transparent 25%),
        conic-gradient(from 20deg, #2f7df6, #23b98f, #e7608b, #f59e0b, #2f7df6);
      box-shadow: 0 0 22px rgba(47, 125, 246, 0.26);
    }

    .encoder-state {
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      color: #475467;
      background: rgba(255, 255, 255, 0.78);
      font-size: 0.82rem;
      font-weight: 650;
    }

    .hero {
      padding: 62px 0 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 390px);
      gap: clamp(28px, 6vw, 72px);
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #4d6b9a;
      font-size: 0.88rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      color: #3f4858;
      font-size: clamp(2.45rem, 6vw, 5.1rem);
      line-height: 1.02;
      font-weight: 420;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 18px 0 0;
      max-width: 630px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.72;
    }

    .orb-panel {
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(47, 125, 246, 0.07), transparent 46%),
        linear-gradient(315deg, rgba(35, 185, 143, 0.08), transparent 50%),
        rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .orb {
      width: min(64%, 220px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      background:
        radial-gradient(circle at 50% 48%, #fff 0 17%, rgba(255, 255, 255, 0.86) 18% 25%, transparent 26%),
        radial-gradient(circle, color-mix(in srgb, var(--active-color, var(--blue)) 26%, transparent), transparent 58%),
        conic-gradient(from 40deg, rgba(47, 125, 246, 0.22), rgba(35, 185, 143, 0.16), rgba(231, 96, 139, 0.13), rgba(245, 158, 11, 0.13), rgba(47, 125, 246, 0.22));
      box-shadow:
        inset 0 0 0 1px rgba(16, 24, 40, 0.08),
        inset 0 0 42px rgba(255, 255, 255, 0.64),
        0 24px 64px color-mix(in srgb, var(--active-color, var(--blue)) 18%, transparent);
    }

    .orb::before,
    .orb::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .orb::before {
      inset: 24px;
      border: 1px solid rgba(16, 24, 40, 0.12);
    }

    .orb::after {
      inset: 58px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.34);
    }

    .is-playing .orb {
      animation: orbGlow 1.45s ease-out;
    }

    .cards-header {
      margin: 18px 0 16px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 760;
    }

    .section-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.03);
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .card:hover {
      border-color: color-mix(in srgb, var(--preset-color) 46%, var(--line));
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .card.is-active {
      border-color: color-mix(in srgb, var(--preset-color) 68%, var(--line));
      box-shadow: 0 12px 30px color-mix(in srgb, var(--preset-color) 12%, transparent);
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--preset-color);
      background: color-mix(in srgb, var(--preset-color) 13%, #fff);
    }

    .icon svg,
    .action-button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-body {
      min-width: 0;
      display: grid;
      gap: 8px;
      overflow-wrap: anywhere;
    }

    .card-title {
      margin: 0;
      color: #121722;
      font-size: 1.02rem;
      line-height: 1.28;
      font-weight: 780;
    }

    .card-desc {
      margin: 0;
      color: #647084;
      font-size: 0.9rem;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .meta {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #475467;
      background: #fff;
      font-size: 0.74rem;
      font-weight: 670;
    }

    .actions {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-button {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #263142;
      background: var(--surface-soft);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .action-button:hover {
      color: #fff;
      background: var(--preset-color);
    }

    .action-button:active {
      transform: scale(0.96);
    }

    .action-button:disabled {
      cursor: wait;
      color: var(--faint);
      background: #eef1f6;
      transform: none;
    }

    .status {
      min-height: 22px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 620;
    }

    @keyframes orbGlow {
      0% {
        transform: scale(0.96);
      }

      30% {
        transform: scale(1.04);
        box-shadow:
          inset 0 0 0 1px rgba(16, 24, 40, 0.08),
          inset 0 0 46px rgba(255, 255, 255, 0.74),
          0 0 68px color-mix(in srgb, var(--active-color, var(--blue)) 30%, transparent),
          0 24px 64px color-mix(in srgb, var(--active-color, var(--blue)) 18%, transparent);
      }

      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 860px) {
      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 36px;
      }

      .orb-panel {
        min-height: 260px;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topbar,
      .cards-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .card {
        grid-template-columns: 40px minmax(0, 1fr);
      }

      .actions {
        grid-column: 1 / -1;
        padding-left: 54px;
        justify-content: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

    function renderCards() {
      candidateCount.textContent = `${presets.length} presets`;
      candidateGrid.innerHTML = presets.map((preset, index) => `
        <article class="card${index === activeIndex ? " is-active" : ""}" style="--preset-color: ${preset.color}" data-index="${index}">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 12h3l3-6v12l4-8 3 4h3" /></svg>
          </div>
          <div class="card-body">
            <h3 class="card-title">${getPresetNumber(index)}. ${preset.name}</h3>
            <p class="card-desc">${preset.desc}</p>
            <div class="meta">
              <span class="chip">${preset.pitch}</span>
              <span class="chip">${preset.layer}</span>
              <span class="chip">${preset.mood}</span>
              <span class="chip">${formatDuration(preset.duration)}</span>
            </div>
          </div>
          <div class="actions">
            <button class="action-button play-card" type="button" aria-label="${preset.name} 재생" title="재생">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor" stroke="none" /></svg>
            </button>
            <button class="action-button download-card" type="button" aria-label="${preset.name} MP3 다운로드" title="MP3 다운로드">
              <svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14" /></svg>
            </button>
          </div>
        </article>
      `).join("");
    }

    async function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
    }

    function createImpulseResponse(ctx, duration = 1.8, decay = 2.6) {
      const sampleRate = ctx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const impulse = ctx.createBuffer(2, length, sampleRate);

      for (let channel = 0; channel < 2; channel += 1) {
        const data = impulse.getChannelData(channel);
        let smoothed = 0;
        for (let index = 0; index < length; index += 1) {
          const t = index / length;
          smoothed = smoothed * 0.94 + (Math.random() * 2 - 1) * 0.06;
          data[index] = smoothed * Math.pow(1 - t, decay) * 0.72;
        }
      }

      return impulse;
    }

    function createSoftNoise(ctx, duration) {
      const sampleRate = ctx.sampleRate;
      const length = Math.ceil(sampleRate * duration);
      const buffer = ctx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);
      let smoothed = 0;

      for (let index = 0; index < length; index += 1) {
        smoothed = smoothed * 0.985 + (Math.random() * 2 - 1) * 0.015;
        data[index] = smoothed;
      }

      return buffer;
    }

    function scheduleTone(ctx, options) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const panner = ctx.createStereoPanner();
      const stopAt = options.start + options.duration;

      osc.type = options.type;
      osc.frequency.setValueAtTime(options.frequency, options.start);
      osc.detune.setValueAtTime(options.detune, options.start);
      panner.pan.setValueAtTime(options.pan, options.start);

      gain.gain.setValueAtTime(0.0001, options.start);
      gain.gain.linearRampToValueAtTime(options.peak, options.start + options.attack);
      gain.gain.setValueAtTime(options.peak, options.start + Math.max(options.attack + 0.02, options.duration * 0.36));
      gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

      osc.connect(gain).connect(panner).connect(options.destination);
      osc.start(options.start);
      osc.stop(stopAt + 0.04);
    }

    function scheduleChime(ctx, preset, start, destination) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      const panner = ctx.createStereoPanner();
      const stopAt = start + 0.78;

      osc.type = "sine";
      osc.frequency.setValueAtTime(preset.chime, start);
      osc.frequency.exponentialRampToValueAtTime(preset.chime * 0.996, stopAt);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2800, start);
      filter.Q.setValueAtTime(0.25, start);
      panner.pan.setValueAtTime(0.18, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(preset.chimeGain, start + 0.055);
      gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

      osc.connect(gain).connect(filter).connect(panner).connect(destination);
      osc.start(start);
      osc.stop(stopAt + 0.04);
    }

    function scheduleNoise(ctx, preset, start, destination) {
      const source = ctx.createBufferSource();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      const panner = ctx.createStereoPanner();
      const duration = preset.duration + 0.08;

      source.buffer = createSoftNoise(ctx, duration);
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(Math.min(1300, preset.filter * 1.25), start);
      filter.Q.setValueAtTime(0.65, start);
      panner.pan.setValueAtTime(-0.16, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(preset.noiseGain, start + 0.18);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      source.connect(filter).connect(gain).connect(panner).connect(destination);
      source.start(start);
      source.stop(start + duration + 0.02);
    }

    function semitoneToFrequency(base, semitone) {
      return base * Math.pow(2, semitone / 12);
    }

    function connectOptionalFilter(ctx, source, layer, start, destination) {
      let current = source;

      if (layer.bandpass) {
        const filter = ctx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(layer.bandpass, start);
        filter.Q.setValueAtTime(layer.q || 1, start);
        current.connect(filter);
        current = filter;
      } else if (layer.lowpass || layer.highpass) {
        if (layer.highpass) {
          const highpass = ctx.createBiquadFilter();
          highpass.type = "highpass";
          highpass.frequency.setValueAtTime(layer.highpass, start);
          highpass.Q.setValueAtTime(0.65, start);
          current.connect(highpass);
          current = highpass;
        }

        if (layer.lowpass) {
          const lowpass = ctx.createBiquadFilter();
          lowpass.type = "lowpass";
          lowpass.frequency.setValueAtTime(layer.lowpass, start);
          lowpass.Q.setValueAtTime(layer.q || 0.55, start);
          current.connect(lowpass);
          current = lowpass;
        }
      }

      current.connect(destination);
    }

    function schedulePromptTone(ctx, layer, start, destination, frequency, index, count) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const panner = ctx.createStereoPanner();
      const duration = Math.max(0.08, layer.duration - (start - (layer.absoluteStart || start)));
      const stopAt = start + duration;
      const peak = (layer.volume || 0.08) / Math.sqrt(Math.max(1, count));
      const attack = Math.min(layer.attack || 0.08, duration * 0.62);

      osc.type = layer.wave || "sine";
      osc.frequency.setValueAtTime(frequency, start);
      if (layer.endFreqs && layer.endFreqs[index]) {
        osc.frequency.exponentialRampToValueAtTime(layer.endFreqs[index], stopAt);
      }

      panner.pan.setValueAtTime(count > 1 ? (index / (count - 1) - 0.5) * 0.42 : 0, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(peak, start + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

      osc.connect(gain).connect(panner);
      connectOptionalFilter(ctx, panner, layer, start, destination);
      osc.start(start);
      osc.stop(stopAt + 0.04);
    }

    function schedulePromptTwoTone(ctx, layer, start, destination) {
      const baseDuration = layer.duration || 1.5;
      const firstLayer = { ...layer, duration: baseDuration };
      const secondLayer = { ...layer, duration: Math.max(0.1, baseDuration - (layer.delay || 0.12)), attack: Math.min(0.14, layer.attack || 0.12) };
      firstLayer.absoluteStart = start;
      secondLayer.absoluteStart = start + (layer.delay || 0.12);
      schedulePromptTone(ctx, firstLayer, start, destination, layer.freqs[0], 0, 2);
      schedulePromptTone(ctx, secondLayer, start + (layer.delay || 0.12), destination, layer.freqs[1], 1, 2);
    }

    function schedulePromptTones(ctx, layer, start, destination) {
      const freqs = layer.freqs || [];
      freqs.forEach((frequency, index) => {
        const noteStart = start + index * (layer.stagger || 0);
        const noteLayer = { ...layer, absoluteStart: start };
        schedulePromptTone(ctx, noteLayer, noteStart, destination, frequency, index, freqs.length);
      });
    }

    function schedulePromptBell(ctx, layer, start, destination) {
      const freqs = layer.freqs || [];
      freqs.forEach((frequency, index) => {
        const bellLayer = {
          ...layer,
          wave: "sine",
          attack: layer.attack ?? 0.014,
          duration: Math.max(0.12, (layer.duration || 1.8) - index * (layer.stagger || 0)),
          absoluteStart: start
        };
        schedulePromptTone(ctx, bellLayer, start + index * (layer.stagger || 0), destination, frequency, index, freqs.length);
      });
    }

    function schedulePromptArpeggio(ctx, layer, start, destination) {
      const freqs = layer.freqs || (layer.steps || []).map((step) => semitoneToFrequency(layer.base || 440, step));
      const stepTime = layer.step || 0.1;
      freqs.forEach((frequency, index) => {
        const noteLayer = {
          ...layer,
          attack: 0.018,
          duration: Math.min(0.62, Math.max(0.16, (layer.duration || 1.4) - index * stepTime)),
          absoluteStart: start
        };
        schedulePromptTone(ctx, noteLayer, start + index * stepTime, destination, frequency, index, freqs.length);
      });
    }

    function schedulePromptNoise(ctx, layer, start, destination) {
      const source = ctx.createBufferSource();
      const gain = ctx.createGain();
      const duration = layer.duration || 1.8;
      const attack = Math.min(layer.attack || 0.16, duration * 0.7);

      source.buffer = createSoftNoise(ctx, duration + 0.1);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(layer.volume || 0.06, start + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      source.connect(gain);
      connectOptionalFilter(ctx, gain, layer, start, destination);
      source.start(start);
      source.stop(start + duration + 0.12);
    }

    function schedulePromptSweep(ctx, layer, start, destination) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const duration = layer.duration || 1.8;
      const freqs = layer.freqs || [80, 96];
      const times = layer.times || freqs.map((_, index) => (duration / Math.max(1, freqs.length - 1)) * index);

      osc.type = "sine";
      osc.frequency.setValueAtTime(freqs[0], start);
      for (let index = 1; index < freqs.length; index += 1) {
        osc.frequency.exponentialRampToValueAtTime(freqs[index], start + Math.min(duration, times[index]));
      }

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(layer.volume || 0.1, start + Math.min(layer.attack || 0.2, duration * 0.5));
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      connectOptionalFilter(ctx, gain, layer, start, destination);
      osc.start(start);
      osc.stop(start + duration + 0.04);
    }

    function schedulePromptFm(ctx, layer, start, destination) {
      const freqs = layer.freqs || [];
      freqs.forEach((frequency, index) => {
        const carrier = ctx.createOscillator();
        const modulator = ctx.createOscillator();
        const modGain = ctx.createGain();
        const amp = ctx.createGain();
        const panner = ctx.createStereoPanner();
        const noteStart = start + index * (layer.stagger || 0);
        const duration = Math.max(0.18, (layer.duration || 1.8) - index * (layer.stagger || 0));
        const peak = (layer.volume || 0.06) / Math.sqrt(Math.max(1, freqs.length));

        carrier.type = "sine";
        modulator.type = "sine";
        carrier.frequency.setValueAtTime(frequency, noteStart);
        modulator.frequency.setValueAtTime(frequency * (layer.modRatio || 2), noteStart);
        modGain.gain.setValueAtTime(layer.modGain || 12, noteStart);
        panner.pan.setValueAtTime(freqs.length > 1 ? (index / (freqs.length - 1) - 0.5) * 0.36 : 0, noteStart);

        amp.gain.setValueAtTime(0.0001, noteStart);
        amp.gain.linearRampToValueAtTime(peak, noteStart + Math.min(layer.attack || 0.08, duration * 0.6));
        amp.gain.exponentialRampToValueAtTime(0.0001, noteStart + duration);

        modulator.connect(modGain).connect(carrier.frequency);
        carrier.connect(amp).connect(panner);
        connectOptionalFilter(ctx, panner, layer, noteStart, destination);
        carrier.start(noteStart);
        modulator.start(noteStart);
        carrier.stop(noteStart + duration + 0.04);
        modulator.stop(noteStart + duration + 0.04);
      });
    }

    function schedulePromptLayer(ctx, layer, presetStart, destination) {
      const start = presetStart + (layer.start || 0);

      if (layer.type === "twoTone") {
        schedulePromptTwoTone(ctx, layer, start, destination);
      } else if (layer.type === "tones") {
        schedulePromptTones(ctx, layer, start, destination);
      } else if (layer.type === "bell") {
        schedulePromptBell(ctx, layer, start, destination);
      } else if (layer.type === "arpeggio") {
        schedulePromptArpeggio(ctx, layer, start, destination);
      } else if (layer.type === "noise") {
        schedulePromptNoise(ctx, layer, start, destination);
      } else if (layer.type === "sweep") {
        schedulePromptSweep(ctx, layer, start, destination);
      } else if (layer.type === "fm") {
        schedulePromptFm(ctx, layer, start, destination);
      }
    }

    function synthesizePromptPreset(ctx, preset, destination, start) {
      const limiter = ctx.createDynamicsCompressor();
      limiter.threshold.setValueAtTime(-16, start);
      limiter.knee.setValueAtTime(18, start);
      limiter.ratio.setValueAtTime(4, start);
      limiter.attack.setValueAtTime(0.006, start);
      limiter.release.setValueAtTime(0.2, start);
      limiter.connect(destination);

      preset.layers.forEach((layer) => {
        schedulePromptLayer(ctx, layer, start, limiter);
      });
    }

    function synthesizePreset(ctx, preset, destination, start) {
      if (preset.layers) {
        synthesizePromptPreset(ctx, preset, destination, start);
        return;
      }

      const duration = preset.duration;
      const bus = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      const dry = ctx.createGain();
      const wet = ctx.createGain();
      const master = ctx.createGain();
      const limiter = ctx.createDynamicsCompressor();
      const reverb = ctx.createConvolver();

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(preset.filter, start);
      filter.frequency.exponentialRampToValueAtTime(Math.max(420, preset.filter * 0.78), start + duration);
      filter.Q.setValueAtTime(preset.q, start);

      reverb.buffer = createImpulseResponse(ctx, Math.min(2.4, duration + 0.66), 2.7);
      dry.gain.setValueAtTime(0.86, start);
      wet.gain.setValueAtTime(preset.auraGain, start);

      master.gain.setValueAtTime(0.0001, start);
      master.gain.linearRampToValueAtTime(preset.master, start + preset.attack);
      master.gain.setValueAtTime(preset.master, start + preset.sustain);
      master.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      limiter.threshold.setValueAtTime(-18, start);
      limiter.knee.setValueAtTime(18, start);
      limiter.ratio.setValueAtTime(4, start);
      limiter.attack.setValueAtTime(0.008, start);
      limiter.release.setValueAtTime(0.18, start);

      bus.connect(filter);
      filter.connect(dry).connect(master);
      filter.connect(reverb).connect(wet).connect(master);
      master.connect(limiter).connect(destination);

      scheduleTone(ctx, {
        frequency: preset.base,
        start,
        duration,
        attack: preset.attack,
        peak: 0.58,
        type: preset.tone,
        detune: -preset.detune,
        pan: -0.12,
        destination: bus
      });

      scheduleTone(ctx, {
        frequency: preset.base * 2,
        start: start + 0.03,
        duration: duration * 0.82,
        attack: preset.attack + 0.04,
        peak: 0.075,
        type: "sine",
        detune: preset.detune,
        pan: 0.08,
        destination: bus
      });

      scheduleTone(ctx, {
        frequency: preset.upper,
        start: start + preset.topDelay,
        duration: duration - preset.topDelay,
        attack: 0.13,
        peak: 0.44,
        type: "sine",
        detune: preset.detune * 0.4,
        pan: 0.12,
        destination: bus
      });

      scheduleChime(ctx, preset, start + preset.chimeDelay, bus);

      scheduleTone(ctx, {
        frequency: preset.chime * 1.5,
        start: start + preset.chimeDelay + 0.06,
        duration: Math.min(1.08, duration - preset.chimeDelay),
        attack: 0.18,
        peak: preset.shimmerGain,
        type: "sine",
        detune: 6,
        pan: 0.28,
        destination: bus
      });

      scheduleNoise(ctx, preset, start, bus);
    }

    async function playPreset(index) {
      activeIndex = index;
      const preset = presets[index];
      await ensureAudioContext();

      document.documentElement.style.setProperty("--active-color", preset.color);
      renderCards();
      synthesizePreset(audioCtx, preset, audioCtx.destination, audioCtx.currentTime + 0.03);
      setStatus(`${preset.name} 재생 중`);

      document.body.classList.remove("is-playing");
      void document.body.offsetWidth;
      document.body.classList.add("is-playing");
      window.clearTimeout(resetTimer);
      resetTimer = window.setTimeout(() => {
        document.body.classList.remove("is-playing");
        setStatus("카드의 재생 버튼을 눌러 시안을 들어보세요.");
      }, preset.duration * 1000);
    }

    async function renderPresetBuffer(preset) {
      const sampleRate = 44100;
      const renderDuration = preset.duration + 0.82;
      const offlineCtx = new OfflineAudioContext(2, Math.ceil(renderDuration * sampleRate), sampleRate);
      synthesizePreset(offlineCtx, preset, offlineCtx.destination, 0.05);
      return offlineCtx.startRendering();
    }

    function floatTo16BitPcm(float32Array) {
      const output = new Int16Array(float32Array.length);
      for (let index = 0; index < float32Array.length; index += 1) {
        const sample = Math.max(-1, Math.min(1, float32Array[index]));
        output[index] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
      }
      return output;
    }

    function encodeMp3(audioBuffer) {
      const sampleRate = audioBuffer.sampleRate;
      const left = floatTo16BitPcm(audioBuffer.getChannelData(0));
      const right = floatTo16BitPcm(audioBuffer.getChannelData(1));
      const encoder = new lamejs.Mp3Encoder(2, sampleRate, 128);
      const blockSize = 1152;
      const chunks = [];

      for (let index = 0; index < left.length; index += blockSize) {
        const leftChunk = left.subarray(index, index + blockSize);
        const rightChunk = right.subarray(index, index + blockSize);
        const mp3buf = encoder.encodeBuffer(leftChunk, rightChunk);
        if (mp3buf.length > 0) {
          chunks.push(mp3buf);
        }
      }

      const end = encoder.flush();
      if (end.length > 0) {
        chunks.push(end);
      }

      return new Blob(chunks, { type: "audio/mpeg" });
    }

    function writeString(view, offset, string) {
      for (let index = 0; index < string.length; index += 1) {
        view.setUint8(offset + index, string.charCodeAt(index));
      }
    }

    function encodeWav(audioBuffer) {
      const sampleRate = audioBuffer.sampleRate;
      const left = audioBuffer.getChannelData(0);
      const right = audioBuffer.getChannelData(1);
      const samples = left.length;
      const buffer = new ArrayBuffer(44 + samples * 4);
      const view = new DataView(buffer);

      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + samples * 4, true);
      writeString(view, 8, "WAVE");
      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 2, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 4, true);
      view.setUint16(32, 4, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, "data");
      view.setUint32(40, samples * 4, true);

      let offset = 44;
      for (let index = 0; index < samples; index += 1) {
        const leftSample = Math.max(-1, Math.min(1, left[index]));
        const rightSample = Math.max(-1, Math.min(1, right[index]));
        view.setInt16(offset, leftSample < 0 ? leftSample * 0x8000 : leftSample * 0x7fff, true);
        view.setInt16(offset + 2, rightSample < 0 ? rightSample * 0x8000 : rightSample * 0x7fff, true);
        offset += 4;
      }

      return new Blob([buffer], { type: "audio/wav" });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function downloadPreset(index, button) {
      const preset = presets[index];
      button.disabled = true;
      setStatus(`${preset.name} 렌더링 중`);

      try {
        const buffer = await renderPresetBuffer(preset);
        const hasMp3Encoder = Boolean(window.lamejs);
        const blob = hasMp3Encoder ? encodeMp3(buffer) : encodeWav(buffer);
        const extension = hasMp3Encoder ? "mp3" : "wav";
        const filename = `${getPresetNumber(index)}-${slugify(preset.name)}.${extension}`;

        downloadBlob(blob, filename);
        setStatus(`${filename} 저장 준비 완료`);
      } catch (error) {
        console.error(error);
        setStatus("다운로드 생성 중 오류가 발생했습니다.");
      } finally {
        button.disabled = false;
      }
    }

    renderCards();
    document.documentElement.style.setProperty("--active-color", presets[0].color);
    updateEncoderState();
    window.addEventListener("load", updateEncoderState);

    candidateGrid.addEventListener("click", (event) => {
      const card = event.target.closest(".card");
      if (!card) {
        return;
      }

      const index = Number(card.dataset.index);
      const playButton = event.target.closest(".play-card");
      const downloadButton = event.target.closest(".download-card");

      if (playButton) {
        playPreset(index);
      }

      if (downloadButton) {
        downloadPreset(index, downloadButton);
      }
    });
  </script>
</body>
</html>
